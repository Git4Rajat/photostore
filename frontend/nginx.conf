server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    types {
        text/html html htm;
        application/javascript js mjs;
        application/wasm wasm;
        text/css css;
        application/json json;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok\n';
    }

    # Cache hashed build assets aggressively. Vite emits content-addressed
    # filenames, so long-lived caching is safe for JS/CSS/WASM chunks.
    location ~* \.(?:js|mjs|css|wasm|png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Browser AI model assets are versioned by the deployed bundle and should be
    # cached aggressively after the first successful fetch.
    location ^~ /models/browser-ai/runtime/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ^~ /models/browser-ai/models/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ^~ /models/face-api/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ^~ /models/blazeface/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location = /models/browser-ai/manifest.json {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
