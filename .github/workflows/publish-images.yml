name: Publish public container images

# Builds the backend and frontend container images and publishes them to the
# GitHub Container Registry (ghcr.io) as PUBLIC images. These images are what
# the "Deploy to Azure" button / ARM + Bicep templates pull from, so a deployer
# never has to build anything themselves.
#
# The worker reuses the backend image (it only differs by APP_ROLE=worker),
# so we publish just two images: photostore-backend and photostore-frontend.
#
# ADMIN-ONLY BY DESIGN
# --------------------
# 1. This workflow is `workflow_dispatch` only. The "Run workflow" button is
#    visible/usable solely to users with write access to the repo, so forkers
#    and drive-by contributors can never start it.
# 2. The job runs in the `publish` Environment, which you must configure in the
#    repo UI (Settings -> Environments -> publish) with "Required reviewers" set
#    to the repo admins. Even a write-access user who clicks Run will pause for
#    an admin approval before anything is pushed.
# 3. An explicit actor allowlist (`if:` below) is a cheap extra guard.
#
# ONE-TIME MANUAL STEP: after the first successful run, set each package's
# visibility to Public (Packages -> photostore-backend / -frontend -> Package
# settings -> Change visibility), or the public Azure deploy can't pull them.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Additional image tag to publish alongside :latest (optional)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Gate 1: only listed admins may trigger a real run. Adjust the list to your
    # repo admins. This is belt-and-suspenders on top of the `publish`
    # Environment's required-reviewers approval gate.
    if: contains(fromJSON('["Git4Rajat"]'), github.actor)
    # Gate 2: Environment with required reviewers -> pauses for admin approval.
    environment: publish
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            lfs: false
          - name: frontend
            context: frontend
            # Frontend build bundles the face model stored in Git LFS.
            lfs: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: ${{ matrix.lfs }}

      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # Use the buildkit container driver; the default docker driver can fail the
      # push to GHCR with "unknown blob".
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR on some personal accounts refuses to let the auto GITHUB_TOKEN
      # *create* a brand-new package (denied: write_package). Authenticate with
      # a classic PAT (scopes: write:packages, read:packages, delete:packages)
      # stored as the GHCR_PAT secret; fall back to GITHUB_TOKEN if unset.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/photostore-${{ matrix.name }}:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/photostore-${{ matrix.name }}:${{ github.sha }}
            ${{ inputs.tag != '' && format('ghcr.io/{0}/photostore-{1}:{2}', steps.owner.outputs.owner, matrix.name, inputs.tag) || '' }}
